name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test, lint, and package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test --locked

      - name: Release build
        run: cargo build --release --locked

      - name: Package smoke test
        run: cargo package --locked --no-verify

      - name: Create CI archive
        run: |
          mkdir -p dist/poneglyph-linux-x86_64
          cp target/release/poneglyph dist/poneglyph-linux-x86_64/
          cp README.md LICENSE dist/poneglyph-linux-x86_64/
          tar -C dist -czf dist/poneglyph-linux-x86_64.tar.gz poneglyph-linux-x86_64
          sha256sum dist/poneglyph-linux-x86_64.tar.gz > dist/poneglyph-linux-x86_64.tar.gz.sha256

      - name: Upload Linux archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: poneglyph-linux-x86_64-archive
          path: |
            dist/poneglyph-linux-x86_64.tar.gz
            dist/poneglyph-linux-x86_64.tar.gz.sha256

      - name: Upload crates.io package artifact
        uses: actions/upload-artifact@v4
        with:
          name: poneglyph-crate-package
          path: target/package/poneglyph-*.crate
